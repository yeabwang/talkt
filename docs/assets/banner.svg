<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="talkt — practice interviews out loud">
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="55%" stop-color="#0c0a09"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#a8a29e"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="360" rx="28" fill="url(#glow)"/>

  <!-- mark -->
  <rect x="96" y="116" width="128" height="128" rx="34" fill="#fafafa"/>
  <g fill="#09090b">
    <rect x="125" y="166" width="10" height="28" rx="5"/>
    <rect x="141" y="152" width="10" height="56" rx="5"/>
    <rect x="157" y="140" width="10" height="80" rx="5"/>
    <rect x="173" y="154" width="10" height="52" rx="5"/>
    <rect x="189" y="164" width="10" height="32" rx="5"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="256" y="200" font-family="'Geist', 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="120" font-weight="700" letter-spacing="-5" fill="#fafafa">talkt</text>
  <text x="262" y="252" font-family="'Geist', 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="400" letter-spacing="0.5" fill="#a8a29e">AI voice interviews — design one, talk it through, get scored.</text>

  <!-- decorative trailing waveform -->
  <g fill="url(#wave)" opacity="0.85">
    <rect x="980"  y="170" width="12" height="20" rx="6"/>
    <rect x="1004" y="148" width="12" height="64" rx="6"/>
    <rect x="1028" y="120" width="12" height="120" rx="6"/>
    <rect x="1052" y="92"  width="12" height="176" rx="6"/>
    <rect x="1076" y="120" width="12" height="120" rx="6"/>
    <rect x="1100" y="150" width="12" height="60" rx="6"/>
    <rect x="1124" y="132" width="12" height="96" rx="6"/>
    <rect x="1148" y="168" width="12" height="24" rx="6"/>
  </g>
</svg>
